services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        REQUIREMENTS: production
    command: daphne -b 0.0.0.0 -p 8000 pycore.asgi:application
    environment:
      - DJANGO_SETTINGS_MODULE=pycore.settings.production
    networks:
      - pycore-network
      - proxy-network
    restart: always

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        REQUIREMENTS: production
    restart: always

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        REQUIREMENTS: production
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        BUILD_MODE: production
    command: sh -c "npm run build && cp -r /app/dist/* /var/www/frontend/ && tail -f /dev/null"
    environment:
      - VITE_API_URL=${VITE_API_URL}
      - VITE_STOREFRONT_BASE_URL=${VITE_STOREFRONT_BASE_URL}
    volumes:
      - frontend-dist:/var/www/frontend
    restart: always

  nginx:
    restart: always
    volumes:
      - frontend-dist:/var/www/frontend
      - ./nginx/conf.d/pycore.prod.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  frontend-dist:

networks:
  proxy-network:
    external: true
